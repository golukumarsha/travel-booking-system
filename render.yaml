services:
  - type: web
    name: traveldeal-b2b
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      # Paste these in the Render dashboard (Environment tab) — never commit
      # real values here. DATABASE_URL is your existing Postgres instance's
      # Internal Connection String (Render dashboard → your database → Info).
      - key: DATABASE_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FLASK_DEBUG
        value: "false"